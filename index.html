<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ffd9e8">
  <title>合成大头像</title>
  <style>
:root {
  --page-max: 420px;
  --ink: #2b2430;
  --soft-ink: #7a687c;
  --panel: rgba(255, 255, 255, 0.76);
  --panel-strong: rgba(255, 255, 255, 0.94);
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: none;
  background:
    radial-gradient(circle at 20% 12%, rgba(255, 255, 255, 0.72), transparent 28%),
    linear-gradient(160deg, #ffe4ef 0%, #dcf7ff 48%, #fff1be 100%);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}

button {
  border: 0;
  font: inherit;
  cursor: pointer;
  touch-action: manipulation;
}

.app {
  width: min(100vw, var(--page-max));
  height: 100dvh;
  min-height: 560px;
  margin: 0 auto;
  padding: max(12px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  gap: 10px;
  touch-action: none;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  min-height: 58px;
}

.top-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.eyebrow {
  margin: 0 0 2px;
  color: var(--soft-ink);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1 {
  margin: 0;
  font-size: 26px;
  line-height: 1.1;
}

.restart-button,
.sound-button,
.primary-button {
  min-height: 44px;
  padding: 0 16px;
  border-radius: 999px;
  color: #fff;
  font-weight: 900;
  background: linear-gradient(135deg, #ff5f9e, #ff935c);
  box-shadow: 0 10px 20px rgba(255, 95, 158, 0.26);
}

.sound-button {
  padding: 0 12px;
  background: linear-gradient(135deg, #5bc7ff, #9a77ff);
  box-shadow: 0 10px 20px rgba(91, 199, 255, 0.22);
}

.score-panel {
  display: grid;
  grid-template-columns: 1fr 1fr 96px;
  gap: 8px;
}

.score-box,
.next-box {
  min-height: 70px;
  padding: 9px 10px;
  border: 1px solid rgba(255, 255, 255, 0.78);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: 0 10px 26px rgba(107, 81, 113, 0.12);
}

.score-box span,
.next-box span {
  display: block;
  color: var(--soft-ink);
  font-size: 12px;
  font-weight: 800;
}

.score-box strong {
  display: block;
  margin-top: 5px;
  font-size: 26px;
  line-height: 1;
}

.next-box {
  display: grid;
  justify-items: center;
  align-content: center;
}

.next-preview {
  width: 38px;
  height: 38px;
  margin-top: 4px;
  border: 3px solid #fff;
  border-radius: 50%;
  background: #ffd65c;
  box-shadow: 0 0 0 3px rgba(255, 95, 158, 0.2), 0 8px 16px rgba(0, 0, 0, 0.14);
  background-position: center;
  background-size: cover;
  overflow: hidden;
  color: #fff;
  display: grid;
  place-items: center;
  font-weight: 900;
}

.game-shell {
  position: relative;
  flex: 1;
  min-height: 0;
  border: 3px solid rgba(255, 255, 255, 0.9);
  border-radius: 8px;
  overflow: hidden;
  background:
    linear-gradient(rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.92)),
    repeating-linear-gradient(0deg, rgba(255, 170, 196, 0.16) 0 1px, transparent 1px 26px);
  box-shadow: inset 0 0 0 1px rgba(255, 159, 190, 0.22), 0 20px 44px rgba(84, 63, 92, 0.18);
  touch-action: none;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
  touch-action: none;
}

.tip {
  position: absolute;
  left: 50%;
  bottom: 10px;
  transform: translateX(-50%);
  max-width: calc(100% - 24px);
  padding: 7px 11px;
  border-radius: 999px;
  color: rgba(43, 36, 48, 0.68);
  background: rgba(255, 255, 255, 0.66);
  font-size: 12px;
  font-weight: 800;
  white-space: nowrap;
  pointer-events: none;
}

.modal {
  position: fixed;
  inset: 0;
  z-index: 20;
  display: grid;
  place-items: center;
  padding: 20px;
  background: rgba(48, 35, 51, 0.36);
}

.modal.hidden {
  display: none;
}

.modal-card {
  width: min(320px, 100%);
  padding: 26px 22px 22px;
  border: 1px solid rgba(255, 255, 255, 0.82);
  border-radius: 8px;
  text-align: center;
  background: var(--panel-strong);
  box-shadow: 0 22px 70px rgba(35, 22, 38, 0.24);
}

.modal-card h2 {
  margin: 0 0 12px;
  font-size: 28px;
}

.modal-card p {
  margin: 8px 0;
  color: var(--soft-ink);
  font-weight: 800;
}

.modal-card strong {
  color: var(--ink);
  font-size: 22px;
}

.primary-button {
  width: 100%;
  margin-top: 18px;
  font-size: 17px;
}

@media (orientation: landscape) and (max-height: 560px) {
  .app {
    min-height: 100dvh;
    padding-top: 8px;
    padding-bottom: 8px;
    gap: 7px;
  }

  .topbar {
    min-height: 46px;
  }

  h1 {
    font-size: 22px;
  }

  .top-actions {
    gap: 6px;
  }

  .restart-button,
  .sound-button {
    min-height: 38px;
    padding: 0 10px;
    font-size: 13px;
  }

  .score-panel {
    grid-template-columns: 1fr 1fr 86px;
  }

  .score-box,
  .next-box {
    min-height: 58px;
    padding: 7px 9px;
  }

  .score-box strong {
    font-size: 22px;
  }
}

</style>
</head>
<body>
  <main class="app" id="app">
    <header class="topbar" aria-label="游戏信息">
      <div>
        <p class="eyebrow">Face Merge</p>
        <h1>合成大头像</h1>
      </div>
      <div class="top-actions">
        <button class="sound-button" id="soundButton" type="button" aria-pressed="false">音乐关</button>
        <button class="restart-button" id="restartButton" type="button">重新开始</button>
      </div>
    </header>

    <section class="score-panel" aria-label="分数">
      <div class="score-box">
        <span>当前分数</span>
        <strong id="score">0</strong>
      </div>
      <div class="score-box">
        <span>最高分</span>
        <strong id="bestScore">0</strong>
      </div>
      <div class="next-box">
        <span>下一个</span>
        <div class="next-preview" id="nextPreview" aria-label="下一个头像预览"></div>
      </div>
    </section>

    <section class="game-shell" id="gameShell" aria-label="游戏区域">
      <canvas id="gameCanvas"></canvas>
      <div class="tip" id="gameTip">拖动选择位置，松手或点击释放</div>
    </section>
  </main>

  <div class="modal hidden" id="gameOverModal" role="dialog" aria-modal="true" aria-labelledby="gameOverTitle">
    <div class="modal-card">
      <h2 id="gameOverTitle">游戏结束</h2>
      <p>本局分数：<strong id="finalScore">0</strong></p>
      <p>最高分：<strong id="modalBestScore">0</strong></p>
      <button class="primary-button" id="playAgainButton" type="button">再来一局</button>
    </div>
  </div>

    updateNextPreview();
    resize();
    Events.on(engine, "collisionStart", handleCollisions);
    animationId = requestAnimationFrame(loop);
  }

  function resize() {
    const rect = shell.getBoundingClientRect();
    width = Math.max(280, Math.floor(rect.width));
    height = Math.max(360, Math.floor(rect.height));
    dpr = Math.min(window.devicePixelRatio || 1, 3);
    canvas.width = Math.floor(width * dpr);
    canvas.height = Math.floor(height * dpr);
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    pointerX = pointerX || width / 2;
    pointerX = clamp(pointerX, getCurrentRadius() + 8, width - getCurrentRadius() - 8);
    rebuildWalls();
  }

  function rebuildWalls() {
    if (!engine) return;
    if (walls.length) {
      World.remove(engine.world, walls);
    }

    const thickness = 80;
    walls = [
      Bodies.rectangle(width / 2, height + thickness / 2 - 6, width + thickness * 2, thickness, { isStatic: true, label: "floor" }),
      Bodies.rectangle(-thickness / 2 + 6, height / 2, thickness, height * 2, { isStatic: true, label: "left-wall" }),
      Bodies.rectangle(width + thickness / 2 - 6, height / 2, thickness, height * 2, { isStatic: true, label: "right-wall" })
    ];
    World.add(engine.world, walls);
  }

  function getCurrentRadius() {
    return levelConfig[currentLevel].radius;
  }

  function dropFace() {
    if (!canDrop || gameOver) return;
    startMusicAfterGesture();
    const radius = getCurrentRadius();
    const x = clamp(pointerX, radius + 8, width - radius - 8);
    createFace(currentLevel, x, dropY + radius, false);
    currentLevel = nextLevel;
    nextLevel = randomSpawnLevel();
    canDrop = false;
    tip.textContent = "准备下一个头像...";
    updateNextPreview();
    setTimeout(() => {
      canDrop = true;
      tip.textContent = "拖动选择位置，松手或点击释放";
    }, dropCooldown);
  }

  function createFace(level, x, y, fromMerge) {
    const config = levelConfig[level];
    const body = Bodies.circle(x, y, config.radius, {
      restitution: 0.16,
      friction: 0.08,
      frictionAir: 0.006,
      density: 0.00125,
      label: "face",
      collisionFilter: { group: 0 }
    });
    body.level = level;
    body.radius = config.radius;
    body.merging = false;
    body.createdAt = performance.now();
    Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.08);
    World.add(engine.world, body);

    if (fromMerge) {
      effects.push({ x, y, level, born: performance.now(), duration: 360, type: "pop" });
    }
    return body;
  }

  function handleCollisions(event) {
    if (gameOver) return;
    for (const pair of event.pairs) {
      const a = pair.bodyA;
      const b = pair.bodyB;
      if (!isMergeable(a, b)) continue;

      a.merging = true;
      b.merging = true;
      const level = a.level;
      const x = (a.position.x + b.position.x) / 2;
      const y = (a.position.y + b.position.y) / 2;
      const next = level + 1;

      setTimeout(() => {
        if (!engine || gameOver) return;
        World.remove(engine.world, [a, b]);
        createFace(next, x, y, true);
        score += (level + 1) * 10;
        if (score > bestScore) {
          bestScore = score;
          storage.set("faceWatermelonBestScore", bestScore);
        }
        effects.push({ x, y, level: next, born: performance.now(), duration: 420, type: "spark" });
        updateScore();
      }, 0);
    }
  }

  function isMergeable(a, b) {
    return a.label === "face" &&
      b.label === "face" &&
      a.level === b.level &&
      a.level < levelConfig.length - 1 &&
      !a.merging &&
      !b.merging;
  }

  function loop(now) {
    const delta = Math.min(now - lastTime, 32);
    lastTime = now;
    if (!gameOver) {
      Engine.update(engine, delta);
      checkDanger(now);
    }
    draw(now);
    animationId = requestAnimationFrame(loop);
  }

  function checkDanger(now) {
    const bodies = engine.world.bodies.filter((body) => {
      if (body.label !== "face" || body.merging) return false;
      if (now - body.createdAt < settleGrace) return false;
      return body.position.y - body.radius < dangerY && Math.abs(body.velocity.y) < 0.35;
    });

    if (bodies.length) {
      if (dangerSince === null) dangerSince = now;
      if (now - dangerSince >= dangerDuration) endGame();
    } else {
      dangerSince = null;
    }
  }

  function endGame() {
    gameOver = true;
    finalScoreEl.textContent = String(score);
    modalBestScoreEl.textContent = String(bestScore);
    modal.classList.remove("hidden");
    tip.textContent = "游戏结束";
  }

  function draw(now) {
    ctx.clearRect(0, 0, width, height);
    drawBackground();
    drawGuide();
    drawBodies(now);
    drawEffects(now);
    drawPreview();
  }

  function drawBackground() {
    ctx.save();
    ctx.strokeStyle = "rgba(255, 95, 108, 0.78)";
    ctx.setLineDash([8, 8]);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(12, dangerY);
    ctx.lineTo(width - 12, dangerY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = "rgba(255, 95, 108, 0.78)";
    ctx.font = "800 12px system-ui, sans-serif";
    ctx.fillText("危险线", 16, dangerY - 8);
    ctx.restore();
  }

  function drawGuide() {
    const radius = getCurrentRadius();
    const x = clamp(pointerX, radius + 8, width - radius - 8);
    ctx.save();
    ctx.strokeStyle = "rgba(255, 95, 158, 0.34)";
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 7]);
    ctx.beginPath();
    ctx.moveTo(x, dropY + radius + 4);
    ctx.lineTo(x, height - 18);
    ctx.stroke();
    ctx.restore();
  }

  function drawBodies(now) {
    for (const body of engine.world.bodies) {
      if (body.label !== "face") continue;
      drawFace(body.position.x, body.position.y, body.radius, body.level, body.angle, 1);
    }
  }

  function drawPreview() {
    const radius = getCurrentRadius();
    const x = clamp(pointerX, radius + 8, width - radius - 8);
    const pulse = canDrop && !gameOver ? 1 + Math.sin(performance.now() / 180) * 0.025 : 0.98;
    drawFace(x, dropY, radius, currentLevel, 0, pulse);
  }

  function drawFace(x, y, radius, level, angle, scale) {
    const config = levelConfig[level];
    const r = radius * scale;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle || 0);
    ctx.shadowColor = config.glow;
    ctx.shadowBlur = 16;
    ctx.beginPath();
    ctx.arc(0, 0, r + 3, 0, Math.PI * 2);
    ctx.fillStyle = config.color;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.lineWidth = Math.max(3, r * 0.11);
    ctx.strokeStyle = "#ffffff";
    ctx.stroke();
    ctx.clip();

    const img = faceImages[level];
    if (imagesLoaded[level] && img.complete && img.naturalWidth > 0) {
      drawCoverImage(img, -r, -r, r * 2, r * 2);
    } else {
      ctx.fillStyle = config.color;
      ctx.fillRect(-r, -r, r * 2, r * 2);
      ctx.fillStyle = "rgba(255, 255, 255, 0.94)";
      ctx.font = `900 ${Math.max(16, r * 0.78)}px system-ui, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(String(level + 1), 0, 1);
    }

    ctx.restore();

    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x - r * 0.12, y - r * 0.12, r * 0.68, Math.PI * 1.08, Math.PI * 1.62);
    ctx.stroke();
    ctx.restore();
  }

  function drawCoverImage(img, x, y, w, h) {
    const imageRatio = img.naturalWidth / img.naturalHeight;
    const targetRatio = w / h;
    let sx = 0;
    let sy = 0;
    let sw = img.naturalWidth;
    let sh = img.naturalHeight;

    if (imageRatio > targetRatio) {
      sw = img.naturalHeight * targetRatio;
      sx = (img.naturalWidth - sw) / 2;
    } else {
      sh = img.naturalWidth / targetRatio;
      sy = (img.naturalHeight - sh) / 2;
    }

    ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
  }

  function drawEffects(now) {
    effects = effects.filter((effect) => now - effect.born < effect.duration);
    for (const effect of effects) {
      const t = (now - effect.born) / effect.duration;
      const config = levelConfig[effect.level];
      ctx.save();
      ctx.globalAlpha = 1 - t;
      ctx.strokeStyle = config.color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(effect.x, effect.y, 18 + t * 44, 0, Math.PI * 2);
      ctx.stroke();

      if (effect.type === "spark") {
        ctx.fillStyle = config.color;
        for (let i = 0; i < 8; i += 1) {
          const angle = (Math.PI * 2 * i) / 8;
          const distance = 12 + t * 42;
          ctx.beginPath();
          ctx.arc(effect.x + Math.cos(angle) * distance, effect.y + Math.sin(angle) * distance, 3 * (1 - t), 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.restore();
    }
  }

  function updateScore() {
    scoreEl.textContent = String(score);
    bestScoreEl.textContent = String(bestScore);
  }

  function updateNextPreview() {
    if (!nextPreview) return;
    const config = levelConfig[nextLevel];
    nextPreview.style.backgroundColor = config.color;
    nextPreview.style.boxShadow = `0 0 0 3px ${config.glow}, 0 8px 16px rgba(0, 0, 0, 0.14)`;
    if (imagesLoaded[nextLevel]) {
      nextPreview.style.backgroundImage = `url("${imagePaths[nextLevel]}")`;
      nextPreview.textContent = "";
    } else {
      nextPreview.style.backgroundImage = "none";
      nextPreview.textContent = String(nextLevel + 1);
    }
  }

  function toggleMusic() {
    musicEnabled = !musicEnabled;
    if (musicEnabled) {
      startMusicAfterGesture();
    } else {
      stopMusic();
    }
    updateSoundButton();
  }

  function startMusicAfterGesture() {
    if (!musicEnabled || musicStarted) return;
    if (!audioContext) {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;
      audioContext = new AudioContextClass();
      masterGain = audioContext.createGain();
      masterGain.gain.value = 0.045;
      masterGain.connect(audioContext.destination);
    }

    audioContext.resume().then(() => {
      if (!musicEnabled || musicStarted) return;
      musicStarted = true;
      noteIndex = 0;
      playMusicNote();
      musicTimer = window.setInterval(playMusicNote, 310);
      updateSoundButton();
    }).catch(() => {
      musicEnabled = false;
      updateSoundButton();
    });
  }

  function stopMusic() {
    musicStarted = false;
    if (musicTimer) {
      window.clearInterval(musicTimer);
      musicTimer = null;
    }
    if (masterGain && audioContext) {
      const now = audioContext.currentTime;
      masterGain.gain.cancelScheduledValues(now);
      masterGain.gain.setTargetAtTime(0.0001, now, 0.04);
    }
  }

  function playMusicNote() {
    if (!audioContext || !masterGain || !musicEnabled) return;
    const now = audioContext.currentTime;
    masterGain.gain.cancelScheduledValues(now);
    masterGain.gain.setTargetAtTime(0.045, now, 0.04);

    const frequency = melody[noteIndex % melody.length];
    const accent = noteIndex % 4 === 0 ? 1.18 : 1;
    noteIndex += 1;
    playTone(frequency, now, 0.22, 0.032 * accent, "triangle");
    playTone(frequency / 2, now, 0.26, 0.018, "sine");
  }

  function playTone(frequency, startTime, duration, volume, type) {
    const oscillator = audioContext.createOscillator();
    const gain = audioContext.createGain();
    oscillator.type = type;
    oscillator.frequency.setValueAtTime(frequency, startTime);
    gain.gain.setValueAtTime(0.0001, startTime);
    gain.gain.exponentialRampToValueAtTime(volume, startTime + 0.025);
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
    oscillator.connect(gain);
    gain.connect(masterGain);
    oscillator.start(startTime);
    oscillator.stop(startTime + duration + 0.03);
  }

  function updateSoundButton() {
    soundButton.textContent = musicEnabled ? "音乐开" : "音乐关";
    soundButton.setAttribute("aria-pressed", musicEnabled ? "true" : "false");
  }

  function setPointerFromEvent(event) {
    const rect = canvas.getBoundingClientRect();
    const point = event.touches && event.touches[0] ? event.touches[0] : event;
    pointerX = clamp(point.clientX - rect.left, getCurrentRadius() + 8, width - getCurrentRadius() - 8);
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function guardButton(event) {
    event.preventDefault();
    event.stopPropagation();
  }

  ["touchstart", "touchmove", "touchend", "pointerdown", "pointermove", "pointerup", "click"].forEach((type) => {
    document.addEventListener(type, (event) => {
      if (event.target.closest("button")) return;
      if (type.startsWith("touch")) event.preventDefault();
    }, { passive: false });
  });

  shell.addEventListener("pointermove", (event) => {
    event.preventDefault();
    setPointerFromEvent(event);
  });

  shell.addEventListener("pointerdown", (event) => {
    event.preventDefault();
    setPointerFromEvent(event);
  });

  shell.addEventListener("pointerup", (event) => {
    event.preventDefault();
    setPointerFromEvent(event);
    if (event.pointerType !== "mouse") dropFace();
  });

  shell.addEventListener("click", (event) => {
    event.preventDefault();
    setPointerFromEvent(event);
    dropFace();
  });

  shell.addEventListener("touchmove", (event) => {
    event.preventDefault();
    setPointerFromEvent(event);
  }, { passive: false });

  shell.addEventListener("touchend", (event) => {
    event.preventDefault();
    dropFace();
  }, { passive: false });

  restartButton.addEventListener("click", (event) => {
    guardButton(event);
    setup();
  });

  soundButton.addEventListener("click", (event) => {
    guardButton(event);
    toggleMusic();
  });

  playAgainButton.addEventListener("click", (event) => {
    guardButton(event);
    setup();
    startMusicAfterGesture();
  });

  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", () => setTimeout(resize, 120));

  setup();
})();

</script>
</body>
</html>
